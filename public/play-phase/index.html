<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Phase - Immersive Actions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Pretendard', sans-serif;
        }

        .immersive-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .immersive-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .image-active {
            display: block;
        }

        #start-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
        }

        #intro-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 90;
            color: white;
        }

        .text-focus-in {
            animation: text-focus-in 0.8s cubic-bezier(0.550, 0.085, 0.680, 0.530) both;
        }

        @keyframes text-focus-in {
            0% { filter: blur(15px); opacity: 0; transform: scale(0.8); }
            100% { filter: blur(0px); opacity: 1; transform: scale(1); }
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.6) 150%);
            pointer-events: none;
            z-index: 20;
        }

        .progress-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 30;
        }

        .progress-segment {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .progress-segment.active {
            background: rgba(59, 130, 246, 1);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .progress-segment.completed {
            background: rgba(34, 197, 94, 1);
        }

        .action-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            z-index: 30;
        }
    </style>
</head>
<body>
    <!-- ?ңмһ‘ ???Җкё??”л©ҙ -->
    <div id="start-overlay" onclick="handleStart()">
        <h1 class="text-5xl font-black text-orange-600 mb-6 tracking-tighter">PLAY PHASE</h1>
        <div class="px-8 py-3 bg-white/10 rounded-full text-white text-xl animate-pulse">
            ?”л©ҙ???ҙлҰӯ?ҳм—¬ ?ңмһ‘?ҳм„ё??
        </div>
    </div>

    <!-- ?ёнҠёлЎ??ӨлІ„?Ҳмқҙ -->
    <div id="intro-overlay">
        <div class="text-center text-focus-in">
            <h2 id="intro-text-en" class="text-[10rem] font-black leading-none mb-4"></h2>
            <p id="intro-text-ko" class="text-6xl font-bold text-blue-400 mt-6"></p>
        </div>
    </div>

    <!-- л©”мқё ?ҙл?м§Җ ?Ғм—ӯ -->
    <div class="immersive-container">
        <img id="img-off" class="immersive-image" alt="OFF">
        <img id="img-on" class="immersive-image" alt="ON">
    </div>

    <!-- м§„н–ү ?ңмӢң (15к°??ёк·ёлЁјнҠё) -->
    <div class="progress-indicator" id="progress-indicator"></div>

    <!-- ?Ўм…ҳ м№ҙмҡҙ??-->
    <div class="action-counter" id="action-counter">ACTION 1/15</div>

    <div class="vignette"></div>

    <script>
        const supabaseUrl = 'https://mwgvserdyflsqyhcqecp.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13Z3ZzZXJkeWZsc3F5aGNxZWNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQ2NzY4MDAsImV4cCI6MjA1MDI1MjgwMH0.7qJqJqJqJqJqJqJqJqJqJqJqJqJqJqJqJqJqJqJqJq';
        const supabase = window.supabase?.createClient(supabaseUrl, supabaseAnonKey) || null;

        const config = {
            stepTime: 500, // 0.5мҙ?(500ms)
            introTime: 2000, // 2мҙ??ёнҠёлЎ?
            actionDuration: 10000 // 10мҙ?(10лІ?л°ҳліө)
        };

        let scenarioData = null;
        let currentActionIndex = 0;
        let isRunning = false;
        let toggleState = false;
        let actionInterval = null;
        let progressInterval = null;

        // 15к°??ҷмһ‘ ?Җ???•мқҳ
        const ACTION_TYPES = [
            'POINT', 'KNOCK', 'CHOP', 'TOUCH', 'PUSH',
            'CLAP', 'PULL', 'SWIPE', 'SNAP', 'GRAB',
            'WALK', 'JUMP', 'LEAN', 'SHRINK', 'EXPLODE'
        ];

        // URL ?ҢлқјлҜён„°?җм„ң ?°мқҙ??к°Җ?ёмҳӨкё?
        const params = new URLSearchParams(window.location.search);
        let scenarioId = params.get('scenarioId') || 'week1_kitchen'; // INIT_PHASE?җм„ң л°ӣм? к°’мңјлЎ??…лҚ°?ҙнҠё к°Җ?Ҙн•ҳ?„лЎқ let?јлЎң ліҖкІ?
        const token = params.get('token');
        const phaseIndex = parseInt(params.get('phaseIndex') || '0');
        
        // ?ңмһ‘ ?Ғнғң м¶”м Ғ (л¬ҙн•ң к№ңл№Ўкұ°лҰј л°©м?)
        let isStarted = false;
        let isStarting = false;

        // л¶ҖлӘЁм—җкІ?PHASE_READY ?„мҶЎ
        function sendPhaseReady() {
            window.parent.postMessage({
                type: 'PHASE_READY',
                phase: 'play'
            }, '*');
        }

        // л¶ҖлӘЁм—җкІ?PHASE_PROGRESS ?„мҶЎ
        function sendPhaseProgress(progress) {
            window.parent.postMessage({
                type: 'PHASE_PROGRESS',
                phase: 'play',
                progress: progress
            }, '*');
        }

        // л¶ҖлӘЁм—җкІ?PHASE_COMPLETE ?„мҶЎ
        function sendPhaseComplete() {
            window.parent.postMessage({
                type: 'PHASE_COMPLETE',
                phase: 'play',
                elapsedTime: config.actionDuration * ACTION_TYPES.length
            }, '*');
        }

        // INIT_PHASE л©”мӢңм§Җ лҰ¬мҠӨ??(??лІҲл§Ң ?Өн–ү)
        let initPhaseReceived = false;
        window.addEventListener('message', (event) => {
            if (event.data.type === 'INIT_PHASE' && event.data.phase === 'play' && !initPhaseReceived) {
                initPhaseReceived = true;
                const data = event.data.data;
                
                // INIT_PHASE?җм„ң л°ӣм? scenarioIdлҘ??„м—ӯ ліҖ?ҳм—җ ?Җ??(?°м„ ?ңмң„ ?’мқҢ)
                if (data.scenarioId) {
                    scenarioId = data.scenarioId;
                }
                
                // ?ӨлІ„?Ҳмқҙ мҰүмӢң ?ңкұ°
                removeStartOverlay();
                
                if (data.scenarioId) {
                    loadScenario(data.scenarioId).then(() => {
                        // ?ңлӮҳлҰ¬мҳӨ лЎңл“ң ?„лЈҢ ??scenarioData кІҖмҰ?
                        if (!scenarioData || !scenarioData.actions || scenarioData.actions.length === 0) {
                            scenarioData = null; // handleStart?җм„ң кё°ліё ?°мқҙ???қм„ұ?ҳлҸ„лЎ?
                        } else {
                        }
                        
                        // ?җлҸҷ ?ңмһ‘
                        setTimeout(() => {
                            handleStart();
                        }, 300);
                    }).catch((error) => {
                        // кё°ліё ?°мқҙ?°лЎң ?ңмһ‘
                        scenarioData = null; // handleStart?җм„ң кё°ліё ?°мқҙ???қм„ұ?ҳлҸ„лЎ?
                        setTimeout(() => {
                            handleStart();
                        }, 300);
                    });
                } else {
                    // scenarioIdк°Җ ?Ҷмңјл©?кё°ліё ?°мқҙ?°лЎң ?ңмһ‘
                    scenarioData = null; // handleStart?җм„ң кё°ліё ?°мқҙ???қм„ұ?ҳлҸ„лЎ?
                    setTimeout(() => {
                        handleStart();
                    }, 300);
                }
            }
        });

        // ?ңлӮҳлҰ¬мҳӨ лЎңл“ң
        async function loadScenario(id) {
            try {
                if (supabase) {
                    const { data, error } = await supabase
                        .from('play_scenarios')
                        .select('*')
                        .eq('id', id)
                        .single();

                    if (error) throw error;
                    if (data && data.scenario_json) {
                        scenarioData = data.scenario_json;
                        
                        // ?ҙл?м§Җ URL??л№„м–ҙ?Ҳмқ„ кІҪмҡ° placeholder ?¬мҡ©
                        if (scenarioData.actions) {
                            scenarioData.actions = scenarioData.actions.map(action => {
                                if (!action.images || !action.images.off || !action.images.on) {
                                    return {
                                        ...action,
                                        images: {
                                            off: action.images?.off || `https://via.placeholder.com/1920x1080/000000/FFFFFF?text=${action.type}_OFF`,
                                            on: action.images?.on || `https://via.placeholder.com/1920x1080/FF6600/FFFFFF?text=${action.type}_ON`
                                        }
                                    };
                                }
                                return action;
                            });
                        }
                    }
                } else {
                    // Supabaseк°Җ ?Ҷмңјл©?кё°ліё ?°мқҙ???¬мҡ©
                    scenarioData = {
                        theme: 'kitchen',
                        actions: ACTION_TYPES.map((type, index) => ({
                            type,
                            startTime: index * 13, // ?ёнҠёлЎ?2мҙ?+ ?Ўм…ҳ 10мҙ?+ ?¬мң  1мҙ?
                            duration: 10,
                            introText: { en: type, ko: getActionKoreanName(type) },
                            images: {
                                off: `https://via.placeholder.com/1920x1080/000000/FFFFFF?text=${type}_OFF`,
                                on: `https://via.placeholder.com/1920x1080/FF6600/FFFFFF?text=${type}_ON`
                            }
                        }))
                    };
                }
            } catch (error) {
                // кё°ліё ?°мқҙ???¬мҡ©
                scenarioData = {
                    theme: 'kitchen',
                    duration: 120,
                    actions: ACTION_TYPES.slice(0, 15).map((type, index) => ({
                        id: `action_${String(index + 1).padStart(3, '0')}`,
                        type,
                        startTime: index * 8,
                        duration: 8,
                        position: { x: 50, y: 50 },
                        intensity: 'MID',
                        introText: { en: type, ko: getActionKoreanName(type) },
                        images: {
                            off: `https://via.placeholder.com/1920x1080/000000/FFFFFF?text=${type}_OFF`,
                            on: `https://via.placeholder.com/1920x1080/FF6600/FFFFFF?text=${type}_ON`
                        }
                    }))
                };
            }
            
            // ?ңлӮҳлҰ¬мҳӨ ?°мқҙ?°к? ?Ҷмңјл©?кё°ліё ?°мқҙ??л°ҳнҷҳ
            if (!scenarioData) {
                scenarioData = {
                    theme: 'kitchen',
                    duration: 120,
                    actions: ACTION_TYPES.slice(0, 15).map((type, index) => ({
                        id: `action_${String(index + 1).padStart(3, '0')}`,
                        type,
                        startTime: index * 8,
                        duration: 8,
                        position: { x: 50, y: 50 },
                        intensity: 'MID',
                        introText: { en: type, ko: getActionKoreanName(type) },
                        images: {
                            off: `https://via.placeholder.com/1920x1080/000000/FFFFFF?text=${type}_OFF`,
                            on: `https://via.placeholder.com/1920x1080/FF6600/FFFFFF?text=${type}_ON`
                        }
                    }))
                };
            }
            
            return scenarioData;
        }

        // ?ҷмһ‘ ?ңк?лӘ?л§Өн•‘
        function getActionKoreanName(type) {
            const names = {
                'POINT': 'м°ҢлҘҙкё?,
                'KNOCK': '?җл“ңлҰ¬кё°',
                'CHOP': 'к°ҖлҘҙкё°',
                'TOUCH': '?°м№ҳ',
                'PUSH': '?ҙм§қ л°Җкё?,
                'CLAP': 'л°•мҲҳ',
                'PULL': '?№кё°кё?,
                'SWIPE': '?‘кё°',
                'SNAP': '?җк????•кё°кё?,
                'GRAB': '?ҖмјңмҘҗкё?,
                'WALK': '?ңмһҗлҰ?кұ·кё°',
                'JUMP': 'к°ҖлІјмҡҙ ?җн”„',
                'LEAN': 'кё°мҡё?ҙкё°',
                'SHRINK': '?…нҒ¬лҰ¬кё°',
                'EXPLODE': '?„мӢ  ?ҙкё°'
            };
            return names[type] || type;
        }

        // м§„н–ү ?ңмӢң мҙҲкё°??
        function initProgressIndicator() {
            const container = document.getElementById('progress-indicator');
            container.innerHTML = '';
            for (let i = 0; i < ACTION_TYPES.length; i++) {
                const segment = document.createElement('div');
                segment.className = 'progress-segment';
                segment.id = `segment-${i}`;
                container.appendChild(segment);
            }
        }

        // м§„н–ү ?ңмӢң ?…лҚ°?ҙнҠё
        function updateProgressIndicator(index, isActive, isCompleted) {
            const segment = document.getElementById(`segment-${index}`);
            if (!segment) return;
            segment.classList.remove('active', 'completed');
            if (isCompleted) {
                segment.classList.add('completed');
            } else if (isActive) {
                segment.classList.add('active');
            }
        }

        // ?Ўм…ҳ м№ҙмҡҙ???…лҚ°?ҙнҠё
        function updateActionCounter(index) {
            const counter = document.getElementById('action-counter');
            if (counter) {
                counter.textContent = `ACTION ${index + 1}/15`;
            }
        }

        const imgOn = document.getElementById('img-on');
        const imgOff = document.getElementById('img-off');
        const startOverlay = document.getElementById('start-overlay');
        const introOverlay = document.getElementById('intro-overlay');

        // ?ӨлІ„?ҲмқҙлҘ??„м „???ңкұ°?ҳлҠ” ?ЁмҲҳ (??лІҲл§Ң ?Өн–ү)
        function removeStartOverlay() {
            if (startOverlay) {
                startOverlay.style.display = 'none';
                startOverlay.style.visibility = 'hidden';
                startOverlay.style.opacity = '0';
                startOverlay.style.pointerEvents = 'none';
                startOverlay.style.position = 'absolute';
                startOverlay.style.zIndex = '-1';
                // DOM?җм„ң ?„м „???ңкұ°
                try {
                    startOverlay.remove();
                } catch (e) {
                }
            }
        }

        async function handleStart() {
            // ?ҙл? ?ңмһ‘?Ҳкұ°???ңмһ‘ мӨ‘мқҙл©?л¬ҙмӢң (л¬ҙн•ң к№ңл№Ўкұ°лҰј л°©м?)
            if (isStarted || isStarting) {
                return;
            }
            
            isStarting = true;
            
            // ?ӨлІ„?Ҳмқҙ мҰүмӢң ?„м „???ңкұ° (к№ңл№Ўкұ°лҰј л°©м?) - ?Ҳл? ?ӨмӢң ?ңмӢң?ҳм? ?ҠмқҢ
            removeStartOverlay();
            
            try {
                // ?ңлӮҳлҰ¬мҳӨ ?°мқҙ?°к? ?ҙл? лЎңл“ң?ҳм—Ҳкі?? нҡЁ?ңм? ?•мқё
                const isScenarioDataValid = scenarioData && 
                                           scenarioData.actions && 
                                           Array.isArray(scenarioData.actions) && 
                                           scenarioData.actions.length > 0;
                
                if (!isScenarioDataValid) {
                    // ?ңлӮҳлҰ¬мҳӨ ?°мқҙ?°к? ?Ҷкұ°??? нҡЁ?ҳм? ?Ҡмңјл©?лЎңл“ң ?ңлҸ„
                    try {
                        await loadScenario(scenarioId);
                        
                        // лЎңл“ң ???ӨмӢң кІҖмҰ?
                        if (!scenarioData || !scenarioData.actions || scenarioData.actions.length === 0) {
                            scenarioData = null; // кё°ліё ?°мқҙ?°лЎң ?ҖмІ?
                        }
                    } catch (error) {
                        scenarioData = null; // кё°ліё ?°мқҙ?°лЎң ?ҖмІ?
                    }
                } else {
                }
                
                // ?ңлӮҳлҰ¬мҳӨ ?°мқҙ?°к? ?Ҷкұ°???Ўм…ҳ???Ҷмңјл©?кё°ліё ?°мқҙ???¬мҡ©
                if (!scenarioData || !scenarioData.actions || scenarioData.actions.length === 0) {
                    scenarioData = {
                        theme: 'kitchen',
                        duration: 120,
                        actions: ACTION_TYPES.slice(0, 15).map((type, index) => ({
                            id: `action_${String(index + 1).padStart(3, '0')}`,
                            type,
                            startTime: index * 8,
                            duration: 8,
                            position: { x: 50, y: 50 },
                            intensity: 'MID',
                            introText: { en: type, ko: getActionKoreanName(type) },
                            images: {
                                off: `https://via.placeholder.com/1920x1080/000000/FFFFFF?text=${type}_OFF`,
                                on: `https://via.placeholder.com/1920x1080/FF6600/FFFFFF?text=${type}_ON`
                            }
                        }))
                    };
                }

                // ?ҙл?м§Җк°Җ л№„м–ҙ?ҲлҠ” ?Ўм…ҳ мІҳлҰ¬ - "?ҙл?м§Җ ?ҶмқҢ" ?ңмӢң??
                scenarioData.actions = scenarioData.actions.map(action => {
                    // ?ҙл?м§Җк°Җ ?Ҷмңјл©?nullлЎ??Өм • (?ҳмӨ‘??"?ҙл?м§Җ ?ҶмқҢ" ?ҚмҠӨ???ңмӢң)
                    if (!action.images || !action.images.off || !action.images.on || 
                        action.images.off === '' || action.images.on === '') {
                        return {
                            ...action,
                            images: {
                                off: null, // ?ҙл?м§Җ ?ҶмқҢ ?ңмӢң
                                on: null   // ?ҙл?м§Җ ?ҶмқҢ ?ңмӢң
                            },
                            hasNoImage: true // ?ҙл?м§Җ ?ҶмқҢ ?Ңлһҳк·?
                        };
                    }
                    return action;
                });

                // startActionSequence() ?ём¶ң ??мөңмў… кІҖмҰ?
                if (!scenarioData || !scenarioData.actions || scenarioData.actions.length === 0) {
                    throw new Error('scenarioData is invalid');
                }

                initProgressIndicator();
                sendPhaseReady();
                startActionSequence();
                isStarted = true;
                isStarting = false;
            } catch (error) {
                // ?җлҹ¬ л°ңмғқ ?ңм—җ??кё°ліё ?°мқҙ?°лЎң ?ңмһ‘
                scenarioData = {
                    theme: 'kitchen',
                    duration: 120,
                    actions: ACTION_TYPES.slice(0, 15).map((type, index) => ({
                        id: `action_${String(index + 1).padStart(3, '0')}`,
                        type,
                        startTime: index * 8,
                        duration: 8,
                        position: { x: 50, y: 50 },
                        intensity: 'MID',
                        introText: { en: type, ko: getActionKoreanName(type) },
                        images: {
                            off: `https://via.placeholder.com/1920x1080/000000/FFFFFF?text=${type}_OFF`,
                            on: `https://via.placeholder.com/1920x1080/FF6600/FFFFFF?text=${type}_ON`
                        }
                    }))
                };
                
                // ?җлҹ¬ мјҖ?ҙмҠӨ?җм„ң??мөңмў… кІҖмҰ?
                if (scenarioData && scenarioData.actions && scenarioData.actions.length > 0) {
                    initProgressIndicator();
                    sendPhaseReady();
                    startActionSequence();
                    isStarted = true;
                } else {
                    // мөңнӣ„???ҳлӢЁ: ?ӨлІ„?Ҳмқҙ ?ӨмӢң ?ңмӢң?ҳм? ?ҠмқҢ (л¬ҙн•ң лЈЁн”„ л°©м?)
                }
                isStarting = false;
            }
        }

        // ?„м—ӯ ?ём¶ң
        window.handleStart = handleStart;

        function startActionSequence() {
            // мөңмў… кІҖмҰ? scenarioData?Җ actionsк°Җ мЎҙмһ¬?ҳлҠ”м§Җ ?•мқё
            if (!scenarioData) {
                // кё°ліё ?°мқҙ???қм„ұ
                scenarioData = {
                    theme: 'kitchen',
                    duration: 120,
                    actions: ACTION_TYPES.slice(0, 15).map((type, index) => ({
                        id: `action_${String(index + 1).padStart(3, '0')}`,
                        type,
                        startTime: index * 8,
                        duration: 8,
                        position: { x: 50, y: 50 },
                        intensity: 'MID',
                        introText: { en: type, ko: getActionKoreanName(type) },
                        images: {
                            off: `https://via.placeholder.com/1920x1080/000000/FFFFFF?text=${type}_OFF`,
                            on: `https://via.placeholder.com/1920x1080/FF6600/FFFFFF?text=${type}_ON`
                        }
                    }))
                };
            }
            
            if (!scenarioData.actions || !Array.isArray(scenarioData.actions) || scenarioData.actions.length === 0) {
                // кё°ліё actions ?қм„ұ
                scenarioData.actions = ACTION_TYPES.slice(0, 15).map((type, index) => ({
                    id: `action_${String(index + 1).padStart(3, '0')}`,
                    type,
                    startTime: index * 8,
                    duration: 8,
                    position: { x: 50, y: 50 },
                    intensity: 'MID',
                    introText: { en: type, ko: getActionKoreanName(type) },
                    images: {
                        off: `https://via.placeholder.com/1920x1080/000000/FFFFFF?text=${type}_OFF`,
                        on: `https://via.placeholder.com/1920x1080/FF6600/FFFFFF?text=${type}_ON`
                    }
                }));
            }
            
            isRunning = true;
            currentActionIndex = 0;
            executeAction(0);
        }

        function executeAction(index) {
            // л°©м–ҙ мҪ”л“ң: scenarioData?Җ actions кІҖмҰ?
            if (!scenarioData || !scenarioData.actions || !Array.isArray(scenarioData.actions)) {
                isRunning = false;
                return;
            }
            
            if (index >= scenarioData.actions.length) {
                // лӘЁл“  ?Ўм…ҳ ?„лЈҢ
                isRunning = false;
                sendPhaseComplete();
                return;
            }

            const action = scenarioData.actions[index];
            currentActionIndex = index;
            updateActionCounter(index);
            updateProgressIndicator(index, true, false);

            // ?ёнҠёлЎ??ңмӢң
            const introTextEn = document.getElementById('intro-text-en');
            const introTextKo = document.getElementById('intro-text-ko');
            
            if (introTextEn && introTextKo && action.introText) {
                introTextEn.textContent = action.introText.en || action.type;
                introTextKo.textContent = `(${action.introText.ko || getActionKoreanName(action.type)})`;
            }

            introOverlay.style.display = 'flex';

            // 2мҙ????ёнҠёлЎ??Ёкё°кі??Ўм…ҳ ?ңмһ‘
            setTimeout(() => {
                introOverlay.style.display = 'none';
                startImageToggle(action, index);
            }, config.introTime);
        }

        function startImageToggle(action, actionIndex) {
            // ?ҙл?м§Җк°Җ ?ҶлҠ” кІҪмҡ° мІҳлҰ¬
            if (action.hasNoImage || !action.images || !action.images.off || !action.images.on || 
                action.images.off === '' || action.images.on === '' || 
                action.images.off === null || action.images.on === null) {
                
                // ?ҙл?м§Җ ?ҶмқҢ ?ҚмҠӨ???ңмӢң
                imgOff.style.display = 'none';
                imgOn.style.display = 'none';
                
                // ?ҚмҠӨ???ңмӢң??div ?қм„ұ
                let noImageDiv = document.getElementById('no-image-text');
                if (!noImageDiv) {
                    noImageDiv = document.createElement('div');
                    noImageDiv.id = 'no-image-text';
                    noImageDiv.style.cssText = `
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%);
                        font-size: 48px;
                        font-weight: bold;
                        color: #ffffff;
                        text-align: center;
                        z-index: 100;
                        background: rgba(0, 0, 0, 0.7);
                        padding: 40px 60px;
                        border-radius: 20px;
                    `;
                    document.body.appendChild(noImageDiv);
                }
                
                const actionName = action.introText?.ko || action.type || '?Ўм…ҳ';
                noImageDiv.textContent = `${actionName}\n?ҙл?м§Җ ?ҶмқҢ`;
                noImageDiv.style.display = 'block';
                
                // 8мҙ????ӨмқҢ ?Ўм…ҳ?јлЎң
                setTimeout(() => {
                    if (noImageDiv) {
                        noImageDiv.style.display = 'none';
                    }
                    imgOff.style.display = 'block';
                    imgOn.style.display = 'block';
                    updateProgressIndicator(actionIndex, false, true);
                    executeAction(actionIndex + 1);
                }, 8000);
                
                return;
            }
            
            // ?ҙл?м§Җк°Җ ?ҲлҠ” кІҪмҡ° кё°мЎҙ лЎңм§Ғ
            const offUrl = action.images.off;
            const onUrl = action.images.on;
            
            // ?ҙл?м§Җ ?„лҰ¬лЎңл“ң
            const offImg = new Image();
            const onImg = new Image();
            
            offImg.src = offUrl;
            onImg.src = onUrl;

            let toggleCount = 0;
            const maxToggles = 20; // 10мҙ?= 20лІ?? к? (0.5мҙ?к°„кІ©)

            // мҙҲкё° ?Ғнғң: OFF
            imgOff.src = offUrl;
            imgOff.style.display = 'block';
            imgOn.style.display = 'block';
            imgOff.classList.add('image-active');
            imgOn.classList.remove('image-active');

            toggleState = false;

            actionInterval = setInterval(() => {
                if (!isRunning) {
                    clearInterval(actionInterval);
                    return;
                }

                toggleState = !toggleState;
                
                if (toggleState) {
                    imgOn.src = onUrl;
                    imgOn.classList.add('image-active');
                    imgOff.classList.remove('image-active');
                } else {
                    imgOff.src = offUrl;
                    imgOff.classList.add('image-active');
                    imgOn.classList.remove('image-active');
                }

                toggleCount++;

                // м§„н–үлҘ?кі„мӮ° л°??„мҶЎ (50% ?„лӢ¬ ???ҢлҰј)
                const progress = toggleCount / maxToggles;
                if (progress === 0.5 || Math.abs(progress - 0.5) < 0.05) {
                    sendPhaseProgress(progress);
                }

                // 10мҙ??„лЈҢ (20лІ?? к?)
                if (toggleCount >= maxToggles) {
                    clearInterval(actionInterval);
                    updateProgressIndicator(actionIndex, false, true);
                    
                    // ?ӨмқҢ ?Ўм…ҳ?јлЎң
                    setTimeout(() => {
                        executeAction(actionIndex + 1);
                    }, 100);
                }
            }, config.stepTime);
        }

        // лёҢлқј?°м? мәҗмӢұ л°©м? л°??¬м „ лЎңл“ң
        window.addEventListener('DOMContentLoaded', () => {
            // ? нҒ° кІҖмҰ?(к°„лӢЁ???ҙлқј?ҙм–ё???¬мқҙ??мІҙнҒ¬)
            if (!token) {
                const startOverlay = document.getElementById('start-overlay');
                if (startOverlay) {
                    startOverlay.innerHTML = '<div style="color:white;text-align:center;padding:50px;"><h1 style="font-size:24px;margin-bottom:20px;">?ёмҰқ ? нҒ°???„мҡ”?©лӢҲ??/h1><p>? нҒ° ?Ҷмқҙ???„лЎңк·ёлһЁ???Өн–ү?????ҶмҠө?ҲлӢӨ.</p></div>';
                }
                return;
            }
            
            // INIT_PHASE л©”мӢңм§Җк°Җ ?јм • ?ңк°„ ?ҙм—җ ?Өм? ?Ҡмңјл©??җлҸҷ ?ңмһ‘
            setTimeout(() => {
                if (!isStarted && !isStarting && !initPhaseReceived) {
                    removeStartOverlay();
                    handleStart();
                }
            }, 1500); // 1.5мҙ????җлҸҷ ?ңмһ‘
        });
    </script>
</body>
