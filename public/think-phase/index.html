<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Think Phase - 3-Panel Multi-Stimulus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Pretendard', sans-serif;
        }

        #start-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
        }

        #intro-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 90;
            color: white;
        }

        .text-focus-in {
            animation: text-focus-in 0.8s cubic-bezier(0.550, 0.085, 0.680, 0.530) both;
        }

        @keyframes text-focus-in {
            0% { filter: blur(15px); opacity: 0; transform: scale(0.8); }
            100% { filter: blur(0px); opacity: 1; transform: scale(1); }
        }

        .panel-container {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2px;
            z-index: 10;
        }

        .panel {
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
        }

        .panel:hover {
            background: #2a2a2a;
        }

        .panel.active {
            background: #3a3a3a;
            box-shadow: inset 0 0 50px rgba(59, 130, 246, 0.5);
        }

        .panel-object {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.6) 150%);
            pointer-events: none;
            z-index: 20;
        }

        .progress-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 30;
        }

        .progress-segment {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .progress-segment.active {
            background: rgba(59, 130, 246, 1);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .progress-segment.completed {
            background: rgba(34, 197, 94, 1);
        }

        .action-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            z-index: 30;
        }
    </style>
</head>
<body>
    <!-- ?£ņ×æ ???ĆĻĖ??öļ®┤ -->
    <div id="start-overlay" onclick="handleStart()">
        <h1 class="text-5xl font-black text-cyan-600 mb-6 tracking-tighter">THINK PHASE</h1>
        <div class="px-8 py-3 bg-white/10 rounded-full text-white text-xl animate-pulse">
            ?öļ®┤???┤ļ”Ł?śņŚ¼ ?£ņ×æ?śņäĖ??
        </div>
    </div>

    <!-- ?ĖĒŖĖļĪ??żļ▓ä?łņØ┤ -->
    <div id="intro-overlay">
        <div class="text-center text-focus-in">
            <h2 id="intro-text-en" class="text-[10rem] font-black leading-none mb-4">THINK</h2>
            <p id="intro-text-ko" class="text-6xl font-bold text-cyan-400 mt-6">(?ØĻ░ü?śĻĖ░)</p>
        </div>
    </div>

    <!-- 3-Panel ņ╗©Ēģī?┤ļäł -->
    <div class="panel-container" id="panel-container">
        <div class="panel" id="panel-0"></div>
        <div class="panel" id="panel-1"></div>
        <div class="panel" id="panel-2"></div>
    </div>

    <!-- ņ¦äĒ¢ē ?£ņŗ£ -->
    <div class="progress-indicator" id="progress-indicator"></div>

    <!-- ?Īņģś ņ╣┤ņÜ┤??-->
    <div class="action-counter" id="action-counter">ROUND 1/10</div>

    <div class="vignette"></div>

    <script>
        const supabaseUrl = 'https://mwgvserdyflsqyhcqecp.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13Z3ZzZXJkeWZsc3F5aGNxZWNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQ2NzY4MDAsImV4cCI6MjA1MDI1MjgwMH0.7qJqJqJqJqJqJqJqJqJqJqJqJqJqJqJqJqJqJqJq';
        const supabase = window.supabase?.createClient(supabaseUrl, supabaseAnonKey) || null;

        const config = {
            roundDuration: 18000, // 18ņ┤?(3ļČ?= 180ņ┤?/ 10?╝ņÜ┤??
            totalRounds: 10,
            objectSpawnInterval: 2000, // 2ņ┤łļ¦ł??Ļ░Øņ▓┤ ?żĒÅ░
            objectLifetime: 3000 // Ļ░Øņ▓┤ 3ņ┤????¼ļØ╝ņ¦?
        };

        let isRunning = false;
        let currentRound = 0;
        let roundStartTime = 0;
        let objects = [];
        let roundInterval = null;

        // ?īļ¦łļ│?Ļ░Øņ▓┤ ļ¬®ļĪØ
        const THEME_OBJECTS = {
            kitchen: ['?ŹÄ', '?źĢ', '?¦ä', '?¦ģ', '?źö', '?Źģ', '?źÆ', '?īČ’Ė?],
            fire_station: ['?ÜÆ', '?öź', '?Æ¦', '?Ü©', '?æ’ĖÅ', '?¦»', '?Üæ', '?ō×'],
            default: ['ŌŁ?, '?ī¤', '?Æ½', '??, '?ö«', '?ÆÄ', '?Ä»', '?Ä▓']
        };

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const theme = params.get('theme') || 'kitchen';

        const objectsForTheme = THEME_OBJECTS[theme] || THEME_OBJECTS.default;

        function sendPhaseReady() {
            window.parent.postMessage({
                type: 'PHASE_READY',
                phase: 'think'
            }, '*');
        }

        function sendPhaseProgress(progress) {
            window.parent.postMessage({
                type: 'PHASE_PROGRESS',
                phase: 'think',
                progress: progress
            }, '*');
        }

        function sendPhaseComplete() {
            window.parent.postMessage({
                type: 'PHASE_COMPLETE',
                phase: 'think',
                elapsedTime: config.roundDuration * config.totalRounds
            }, '*');
        }

        window.addEventListener('message', (event) => {
            if (event.data.type === 'INIT_PHASE' && event.data.phase === 'think') {
                const data = event.data.data;
                if (data.duration) {
                    // duration ?ģļŹ░?┤ĒŖĖ (?äņÜö??
                    config.roundDuration = (data.duration * 1000) / config.totalRounds;
                }
                // ?ÉļÅÖ ?£ņ×æ
                setTimeout(() => {
                    handleStart();
                }, 500);
            }
        });

        function initProgressIndicator() {
            const container = document.getElementById('progress-indicator');
            container.innerHTML = '';
            for (let i = 0; i < config.totalRounds; i++) {
                const segment = document.createElement('div');
                segment.className = 'progress-segment';
                segment.id = `segment-${i}`;
                container.appendChild(segment);
            }
        }

        function updateProgressIndicator(round, isActive, isCompleted) {
            const segment = document.getElementById(`segment-${round}`);
            if (!segment) return;
            segment.classList.remove('active', 'completed');
            if (isCompleted) {
                segment.classList.add('completed');
            } else if (isActive) {
                segment.classList.add('active');
            }
        }

        function updateRoundCounter(round) {
            const counter = document.getElementById('action-counter');
            if (counter) {
                counter.textContent = `ROUND ${round + 1}/${config.totalRounds}`;
            }
        }

        function handleStart() {
            const startOverlay = document.getElementById('start-overlay');
            if (!startOverlay) {
                return;
            }
            
            startOverlay.style.display = 'none';
            initProgressIndicator();
            sendPhaseReady();
            startThinkPhase();
        }

        // ?äņŚŁ ?ĖņČ£
        window.handleStart = handleStart;

        function startThinkPhase() {
            isRunning = true;
            currentRound = 0;
            roundStartTime = Date.now();
            executeRound(0);
        }

        function executeRound(round) {
            if (round >= config.totalRounds) {
                isRunning = false;
                sendPhaseComplete();
                return;
            }

            currentRound = round;
            updateRoundCounter(round);
            updateProgressIndicator(round, true, false);

            // ?©ļäÉ ņ┤łĻĖ░??
            clearAllObjects();
            
            // Ļ░Øņ▓┤ ?żĒÅ░ ?£ņ×æ
            const spawnInterval = setInterval(() => {
                if (!isRunning) {
                    clearInterval(spawnInterval);
                    return;
                }
                spawnRandomObject();
            }, config.objectSpawnInterval);

            // ?╝ņÜ┤??ņóģļŻī
            setTimeout(() => {
                clearInterval(spawnInterval);
                clearAllObjects();
                updateProgressIndicator(round, false, true);
                
                // ņ¦äĒ¢ēļź??äņåĪ (50% ?äļŗ¼ ??
                const progress = (round + 1) / config.totalRounds;
                if (progress >= 0.5 && progress < 0.55) {
                    sendPhaseProgress(progress);
                }

                // ?żņØī ?╝ņÜ┤??
                setTimeout(() => {
                    executeRound(round + 1);
                }, 500);
            }, config.roundDuration);
        }

        function spawnRandomObject() {
            const panelIndex = Math.floor(Math.random() * 3);
            const panel = document.getElementById(`panel-${panelIndex}`);
            if (!panel) return;

            const obj = document.createElement('div');
            obj.className = 'panel-object';
            obj.textContent = objectsForTheme[Math.floor(Math.random() * objectsForTheme.length)];
            obj.style.left = `${20 + Math.random() * 60}%`;
            obj.style.top = `${20 + Math.random() * 60}%`;
            obj.style.transform = 'scale(0)';
            
            panel.appendChild(obj);
            objects.push(obj);

            // ?Āļŗłļ®öņØ┤??
            setTimeout(() => {
                obj.style.transform = 'scale(1)';
            }, 10);

            // ?┤ļ”Ł ?┤ļ▓ż??
            obj.style.cursor = 'pointer';
            obj.onclick = () => {
                obj.style.transform = 'scale(1.5)';
                obj.style.opacity = '0';
                setTimeout(() => {
                    if (obj.parentNode) {
                        obj.parentNode.removeChild(obj);
                    }
                    objects = objects.filter(o => o !== obj);
                }, 200);
            };

            // ?ÉļÅÖ ?£Ļ▒░
            setTimeout(() => {
                if (obj.parentNode) {
                    obj.style.opacity = '0';
                    obj.style.transform = 'scale(0)';
                    setTimeout(() => {
                        if (obj.parentNode) {
                            obj.parentNode.removeChild(obj);
                        }
                        objects = objects.filter(o => o !== obj);
                    }, 300);
                }
            }, config.objectLifetime);
        }

        function clearAllObjects() {
            objects.forEach(obj => {
                if (obj.parentNode) {
                    obj.parentNode.removeChild(obj);
                }
            });
            objects = [];
        }

        window.addEventListener('DOMContentLoaded', () => {
            // ?ĀĒü░ Ļ▓Ćņ”?(Ļ░äļŗ©???┤ļØ╝?┤ņ¢Ė???¼ņØ┤??ņ▓┤Ēü¼)
            if (!token) {
                const startOverlay = document.getElementById('start-overlay');
                if (startOverlay) {
                    startOverlay.innerHTML = '<div style="color:white;text-align:center;padding:50px;"><h1 style="font-size:24px;margin-bottom:20px;">?Ėņ”Ø ?ĀĒü░???äņÜö?®ļŗł??/h1><p>?ĀĒü░ ?åņØ┤???äļĪ£ĻĘĖļ×©???żĒ¢ē?????åņŖĄ?łļŗż.</p></div>';
                }
                return;
            }
            
            // ņ┤łĻĖ░??
        });
    </script>
</body>
</html>
