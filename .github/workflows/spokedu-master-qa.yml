name: SPOKEDU MASTER QA

on:
  pull_request:
    paths:
      - 'app/spokedu-master/**'
      - 'app/api/spokedu-master/**'
      - 'app/api/admin/spokedu-master/**'
      - 'scripts/spokedu-master-*.mjs'
      - '.github/workflows/spokedu-master-qa.yml'
  push:
    branches: [main, master]
    paths:
      - 'app/spokedu-master/**'
      - 'app/api/spokedu-master/**'
      - 'app/api/admin/spokedu-master/**'
      - 'scripts/spokedu-master-*.mjs'
  workflow_dispatch:

concurrency:
  group: spokedu-master-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static audits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: node scripts/spokedu-master-home-content-audit.mjs
      - run: node scripts/spokedu-master-home-visual-audit.mjs
      - run: node scripts/spokedu-master-copy-scan.mjs

  routing:
    name: Routing smoke (local)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Start Next.js
        run: |
          npm run build
          npm run start -- -p 3099 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3099/spokedu-master/landing >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start in time"
          exit 1
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: node scripts/spokedu-master-dashboard-qa.mjs http://127.0.0.1:3099

  home-logged:
    name: Logged-in home (optional)
    runs-on: ubuntu-latest
    needs: routing
    if: ${{ github.event_name != 'pull_request' && secrets.SPOKEDU_MASTER_QA_ID != '' && secrets.SPOKEDU_MASTER_QA_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm i -D playwright@1.52.0
      - run: npx playwright install chromium --with-deps
      - name: Start Next.js
        run: |
          npm run build
          npm run start -- -p 3099 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3099/spokedu-master/landing >/dev/null; then exit 0; fi
            sleep 2
          done
          exit 1
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: node scripts/spokedu-master-home-logged-qa.mjs http://127.0.0.1:3099
        env:
          SPOKEDU_MASTER_QA_ID: ${{ secrets.SPOKEDU_MASTER_QA_ID }}
          SPOKEDU_MASTER_QA_PASSWORD: ${{ secrets.SPOKEDU_MASTER_QA_PASSWORD }}
