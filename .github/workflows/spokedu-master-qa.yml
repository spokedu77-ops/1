name: SPOKEDU MASTER QA

# 역할 분리
# - master-gate: MASTER 표면이 바뀔 때 항상 (lint + contract vitest). 빠르고 시끄럽지 않게.
# - commercial-linux-smoke: release/commercial 브랜치 또는 수동 실행에서만 빌드·기동 스모크.
# - 전체 repo typecheck는 typecheck.yml 담당 (이 워크플로에서 중복 실행하지 않음).
# - Lane B staging은 workflow_dispatch 입력으로만.

on:
  pull_request:
    paths:
      - 'app/spokedu-master/**'
      - 'app/api/spokedu-master/**'
      - 'app/login/page.tsx'
      - 'app/lib/server/spokeduMaster*'
      - 'proxy.ts'
      - 'scripts/spokedu-master-*.mjs'
      - 'scripts/smoke-spokedu-master-operational-data.mjs'
      - 'supabase/migrations/*spokedu_master*.sql'
      - 'docs/spokedu-master-commercial-runbook.md'
      - '.github/workflows/spokedu-master-qa.yml'
  push:
    branches: [main, master, 'release/**', 'commercial/**']
    paths:
      - 'app/spokedu-master/**'
      - 'app/api/spokedu-master/**'
      - 'app/login/page.tsx'
      - 'app/lib/server/spokeduMaster*'
      - 'proxy.ts'
      - 'scripts/spokedu-master-*.mjs'
      - 'scripts/smoke-spokedu-master-operational-data.mjs'
      - 'supabase/migrations/*spokedu_master*.sql'
      - 'docs/spokedu-master-commercial-runbook.md'
      - '.github/workflows/spokedu-master-qa.yml'
  workflow_dispatch:
    inputs:
      preview_base_url:
        description: 'Optional Vercel Preview base URL for read-only remote smoke'
        required: false
        type: string
      run_staging_validation:
        description: 'Run guarded remote staging validation'
        required: false
        default: false
        type: boolean
      run_toss_sandbox:
        description: 'Allow Toss sandbox checks after staging preflight'
        required: false
        default: false
        type: boolean
      run_destructive_flows:
        description: 'Allow destructive staging flows for disposable QA accounts only'
        required: false
        default: false
        type: boolean
      run_commercial_smoke:
        description: 'Force Linux production build + next start smoke (even on main)'
        required: false
        default: false
        type: boolean

concurrency:
  group: spokedu-master-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  master-gate:
    name: MASTER gate — lint + contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      NEXT_PUBLIC_TOSS_CLIENT_KEY: test_ci_client_key
      TOSS_SECRET_KEY: test_ci_secret_key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: npm ci
        run: npm ci

      - name: ESLint (MASTER surface only)
        run: >
          npx eslint
          app/spokedu-master
          app/api/spokedu-master
          app/lib/server/spokeduMasterAccess.ts
          app/lib/server/spokeduMasterPayment.ts
          app/lib/server/spokeduMasterPaymentApply.ts
          proxy.ts
          scripts/spokedu-master-commercial-smoke-qa.mjs
          scripts/spokedu-master-commercial-preflight.mjs
          --max-warnings 0

      - name: MASTER contract Vitest
        run: >
          npx vitest run
          app/lib/server/spokeduMasterEntitlement.test.ts
          app/lib/server/spokeduMasterProxyAccess.contract.test.ts
          app/lib/server/spokeduMasterPaymentApply.test.ts
          app/lib/server/spokeduMasterPaymentRpcMigration.contract.test.ts
          app/api/spokedu-master/payment/create-checkout/route.contract.test.ts
          app/api/spokedu-master/payment/confirm/ownership.contract.test.ts
          app/api/spokedu-master/payment/webhook/route.test.ts
          app/api/spokedu-master/class-records/createClassRecord.contract.test.ts
          app/api/spokedu-master/class-records/replaceClassRecord.contract.test.ts
          app/api/spokedu-master/operational-data/route.test.ts
          app/api/spokedu-master/apiRouteImports.contract.test.ts
          app/api/spokedu-master/access/route.test.ts
          app/api/spokedu-master/subscription/route.test.ts
          app/api/spokedu-master/operational-routes.test.ts
          app/spokedu-master/navigation.contract.test.ts
          app/spokedu-master/lessonFlow.contract.test.ts
          app/spokedu-master/terminology.contract.test.ts
          app/spokedu-master/serviceTruthfulness.test.ts
          app/spokedu-master/masterEntryCopy.contract.test.ts
          app/spokedu-master/entryOnboardingAccess.contract.test.ts
          app/spokedu-master/landing/landingBillingCopy.contract.test.ts

      - name: git diff check
        run: git diff --check

      - name: Write gate report
        if: always()
        run: |
          mkdir -p commercial-verification
          cat > commercial-verification/master-gate-report.json <<'JSON'
          {
            "job": "master-gate",
            "scope": "lint_and_contracts_only",
            "commercialSmoke": "separate_job_when_release_or_dispatch"
          }
          JSON

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spokedu-master-gate-artifacts
          path: commercial-verification/master-gate-report.json
          if-no-files-found: ignore

  commercial-linux-smoke:
    name: Commercial — Linux build + start smoke
    runs-on: ubuntu-latest
    needs: master-gate
    # main 일상 푸시에서는 생략. 상용 브랜치·수동(run_commercial_smoke)에서만 무거운 빌드/기동.
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_commercial_smoke) || startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'commercial/') }}
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      NEXT_PUBLIC_TOSS_CLIENT_KEY: test_ci_client_key
      TOSS_SECRET_KEY: test_ci_secret_key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Linux next start
        run: |
          set -euo pipefail
          npm run start -- -p 3099 > next-start.log 2>&1 &
          echo $! > next-start.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3099/login >/dev/null; then
              echo "next start ready"
              exit 0
            fi
            sleep 2
          done
          echo "next start did not become ready"
          tail -n 80 next-start.log || true
          exit 1

      - name: Non-login route smoke
        run: |
          set -euo pipefail
          curl -sfI http://127.0.0.1:3099/login >/dev/null
          curl -sfI http://127.0.0.1:3099/spokedu-master/landing >/dev/null
          curl -sfI http://127.0.0.1:3099/spokedu-master/payment >/dev/null

      - name: Write commercial smoke report
        if: always()
        run: |
          mkdir -p commercial-verification
          cat > commercial-verification/commercial-verification-report.json <<'JSON'
          {
            "laneA": "commercial_linux_smoke",
            "laneB": "not_run_in_this_job",
            "finalDecision": "HOLD_UNTIL_REMOTE_STAGING_AND_TOSS_COMPLETE"
          }
          JSON

      - name: Upload commercial smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spokedu-master-commercial-smoke-artifacts
          path: |
            commercial-verification/commercial-verification-report.json
            next-start.log
          if-no-files-found: ignore

  preview-remote-smoke:
    name: Preview remote read-only smoke
    runs-on: ubuntu-latest
    needs: master-gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.preview_base_url != '' }}
    timeout-minutes: 10
    steps:
      - name: Validate preview URL
        run: |
          set -euo pipefail
          case "${{ inputs.preview_base_url }}" in
            https://*.vercel.app|https://*.vercel.app/) ;;
            *)
              echo "Preview URL rejected"
              exit 1
              ;;
          esac

      - name: Read-only preview route smoke
        run: |
          set -euo pipefail
          BASE="${{ inputs.preview_base_url }}"
          BASE="${BASE%/}"
          curl -sfI "$BASE/login" >/dev/null
          curl -sfI "$BASE/spokedu-master/landing" >/dev/null
          curl -sfI "$BASE/spokedu-master/payment" >/dev/null

  lane-b-staging-guard:
    name: Lane B — staging guard
    runs-on: ubuntu-latest
    needs: master-gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_staging_validation }}
    timeout-minutes: 10
    env:
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      SPM_RUNTIME_ENV: ${{ secrets.SPM_RUNTIME_ENV }}
      SPM_APPROVED_STAGING_SUPABASE_REF: ${{ secrets.SPM_APPROVED_STAGING_SUPABASE_REF }}
      SPM_STAGING_WRITE_GUARD: ${{ secrets.SPM_STAGING_WRITE_GUARD }}
      STAGING_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
      STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      STAGING_NEXT_PUBLIC_TOSS_CLIENT_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_TOSS_CLIENT_KEY }}
      STAGING_TOSS_SECRET_KEY: ${{ secrets.STAGING_TOSS_SECRET_KEY }}
      SPOKEDU_MASTER_QA_ID: ${{ secrets.SPOKEDU_MASTER_QA_ID }}
      SPOKEDU_MASTER_QA_PASSWORD: ${{ secrets.SPOKEDU_MASTER_QA_PASSWORD }}
      SPOKEDU_MASTER_QA_SECONDARY_ID: ${{ secrets.SPOKEDU_MASTER_QA_SECONDARY_ID }}
      SPOKEDU_MASTER_QA_SECONDARY_PASSWORD: ${{ secrets.SPOKEDU_MASTER_QA_SECONDARY_PASSWORD }}
      SPM_DISPOSABLE_QA_ALLOWLIST: ${{ secrets.SPM_DISPOSABLE_QA_ALLOWLIST }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_TOSS_CLIENT_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_TOSS_CLIENT_KEY }}
      TOSS_SECRET_KEY: ${{ secrets.STAGING_TOSS_SECRET_KEY }}
      CI_RELEASE_BRANCH: ${{ startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'commercial/') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Staging preflight
        id: preflight
        run: |
          set +e
          node scripts/spokedu-master-commercial-preflight.mjs
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "passed=false" >> "$GITHUB_OUTPUT"
          if [ "${CI_RELEASE_BRANCH}" = "true" ]; then
            exit 1
          fi
          exit 0

      - name: Install Playwright chromium
        if: steps.preflight.outputs.passed == 'true'
        run: npx playwright install chromium --with-deps

      - name: Remote staging commercial smoke
        if: steps.preflight.outputs.passed == 'true'
        run: npm run qa:spokedu-master -- --base-url "$STAGING_BASE_URL"

      - name: Remote staging no-payment verification report
        if: steps.preflight.outputs.passed == 'true'
        run: node scripts/spokedu-master-commercial-verification-report.mjs "$STAGING_BASE_URL"

      - name: Toss sandbox status
        if: steps.preflight.outputs.passed == 'true'
        run: |
          if [ "${{ inputs.run_toss_sandbox }}" != "true" ]; then
            echo "Toss sandbox: NOT RUN — workflow input disabled"
            exit 0
          fi
          npm run qa:spokedu-master:staging-payment -- "$STAGING_BASE_URL"

      - name: Destructive flow status
        if: steps.preflight.outputs.passed == 'true'
        run: |
          if [ "${{ inputs.run_destructive_flows }}" != "true" ]; then
            echo "Destructive flows: NOT RUN — workflow input disabled"
            exit 0
          fi
          echo "Destructive flows: allowed for disposable QA accounts after preflight"

      - name: Write Lane B report
        if: always()
        run: |
          mkdir -p commercial-verification
          cat > commercial-verification/commercial-verification-report.json <<JSON
          {
            "laneBPreflight": "${{ steps.preflight.outputs.passed || 'not_run' }}",
            "tossSandbox": "${{ inputs.run_toss_sandbox && 'requested' || 'not_requested' }}",
            "destructiveFlows": "${{ inputs.run_destructive_flows && 'requested' || 'not_requested' }}",
            "finalDecision": "HOLD_UNTIL_ALL_REMOTE_CHECKS_PASS"
          }
          JSON

      - name: Upload Lane B artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spokedu-master-lane-b-artifacts
          path: commercial-verification/commercial-verification-report.json
          if-no-files-found: ignore
