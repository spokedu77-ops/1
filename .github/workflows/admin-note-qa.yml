name: Admin Note QA

on:
  pull_request:
    paths:
      - 'app/admin/note/**'
      - 'app/api/admin/note/**'
      - 'app/lib/note/**'
      - 'scripts/admin-note-foundation-qa.mjs'
      - 'scripts/admin-note-regression-qa.mjs'
      - 'scripts/admin-note-smoke-qa.mjs'
      - 'scripts/admin-note-block-invariants.mjs'
      - 'scripts/admin-note-content-integrity.mjs'
      - 'scripts/admin-note-data-integrity.mjs'
      - 'scripts/note-invariant-qa.mjs'
      - 'scripts/note-qa/**'
      - 'scripts/verify-note-cross-select-qa.mjs'
      - '.github/workflows/admin-note-qa.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: admin-note-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: TypeScript (noEmit)
        run: npm run typecheck
      - run: npm run verify:admin-note

  e2e:
    name: Playwright smoke & invariants
    runs-on: ubuntu-latest
    needs: unit
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SPM_QA_PASSWORD: ${{ secrets.SPM_QA_PASSWORD }}
      NOTE_QA_BASE_URL: http://127.0.0.1:3099
    steps:
      - name: Gate E2E (require secrets on main push)
        id: gate
        run: |
          set -euo pipefail

          missing=()
          for name in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SPM_QA_PASSWORD; do
            eval "val=\${$name:-}"
            if [ -z "$val" ]; then
              missing+=("$name")
            fi
          done

          # 시크릿이 없으면 E2E를 실행하지 않고 skip한다(경고만).
          # 저장소 시크릿이 설정되면 자동으로 다시 활성화되어 실제 E2E가 돈다.
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::Admin Note E2E skipped; secrets not configured: ${missing[*]}"
            echo "e2e_enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "E2E enabled."
          echo "e2e_enabled=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.gate.outputs.e2e_enabled == 'true'
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.e2e_enabled == 'true'
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
        if: steps.gate.outputs.e2e_enabled == 'true'
      - run: npx playwright install chromium --with-deps
        if: steps.gate.outputs.e2e_enabled == 'true'
      - name: Start Next.js
        if: steps.gate.outputs.e2e_enabled == 'true'
        run: |
          npm run build
          npm run start -- -p 3099 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3099/login >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start in time"
          exit 1
      - name: Foundation smoke QA
        if: steps.gate.outputs.e2e_enabled == 'true'
        run: node scripts/admin-note-foundation-qa.mjs http://127.0.0.1:3099
      - name: Regression editing QA
        if: steps.gate.outputs.e2e_enabled == 'true' && github.event_name != 'pull_request'
        run: node scripts/admin-note-regression-qa.mjs http://127.0.0.1:3099
      - name: Data integrity audit
        if: steps.gate.outputs.e2e_enabled == 'true'
        run: node scripts/admin-note-data-integrity.mjs
      - name: Block invariant audit
        if: steps.gate.outputs.e2e_enabled == 'true'
        run: npm run audit:admin-note-blocks:all
      - name: Content integrity audit
        if: steps.gate.outputs.e2e_enabled == 'true'
        run: node scripts/admin-note-content-integrity.mjs
      - name: Cross-select invariants (quick pair scan)
        if: steps.gate.outputs.e2e_enabled == 'true' && github.event_name == 'pull_request'
        run: npm run qa:note-invariants:quick
      - name: Cross-select invariants (full pair scan)
        if: steps.gate.outputs.e2e_enabled == 'true' && github.event_name != 'pull_request'
        run: npm run qa:note-invariants
