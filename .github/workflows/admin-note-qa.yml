name: Admin Note QA

on:
  pull_request:
    paths:
      - 'app/admin/note/**'
      - 'app/api/admin/note/**'
      - 'app/lib/note/**'
      - 'scripts/admin-note-smoke-qa.mjs'
      - 'scripts/note-invariant-qa.mjs'
      - 'scripts/note-qa/**'
      - 'scripts/verify-note-cross-select-qa.mjs'
      - '.github/workflows/admin-note-qa.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main, master]
    paths:
      - 'app/admin/note/**'
      - 'app/api/admin/note/**'
      - 'app/lib/note/**'
      - 'scripts/admin-note-smoke-qa.mjs'
      - 'scripts/note-invariant-qa.mjs'
      - 'scripts/note-qa/**'
      - 'scripts/verify-note-cross-select-qa.mjs'
      - '.github/workflows/admin-note-qa.yml'
  workflow_dispatch:

concurrency:
  group: admin-note-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run verify:admin-note
      - name: Production build (Vercel parity)
        run: npm run build

  e2e:
    name: Playwright smoke & invariants
    runs-on: ubuntu-latest
    needs: unit
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SPM_QA_PASSWORD: ${{ secrets.SPM_QA_PASSWORD }}
      NOTE_QA_BASE_URL: http://127.0.0.1:3099
    steps:
      - uses: actions/checkout@v4
        if: env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
      - uses: actions/setup-node@v4
        if: env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
        if: env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
      - run: npx playwright install chromium --with-deps
        if: env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
      - name: Start Next.js
        if: env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: |
          npm run build
          npm run start -- -p 3099 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3099/login >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start in time"
          exit 1
      - name: Smoke QA
        if: env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: node scripts/admin-note-smoke-qa.mjs http://127.0.0.1:3099
      - name: Cross-select invariants (quick pair scan)
        if: env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' && github.event_name == 'pull_request'
        run: npm run qa:note-invariants:quick
      - name: Cross-select invariants (full pair scan)
        if: env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' && github.event_name != 'pull_request'
        run: npm run qa:note-invariants
