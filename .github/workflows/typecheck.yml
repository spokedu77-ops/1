name: TypeScript check

# 전체 repo tsc 전용. MASTER QA(spokedu-master-qa)는 여기를 중복 실행하지 않는다.
on:
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/typecheck.yml'
  push:
    branches: [main, master]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/typecheck.yml'
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: npm ci
        run: npm ci

      - name: TypeScript
        run: npm run typecheck
